<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اM🌹</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#ffd1dc;
  direction:rtl;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* شاشة الباسورد */
#loginBox{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#ffd1dc;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loginBox div{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

/* الرسائل */
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:15px;
  color:white;
  position:relative;
}

.me{
  margin-left:auto;
  background:#4CAF50;
}

.other{
  margin-right:auto;
  background:#ff4d6d;
}

.time{
  font-size:12px;
  opacity:0.8;
  margin-top:5px;
}

.delete{
  position:absolute;
  top:5px;
  left:5px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* الإدخال */
#inputBox{
  display:flex;
  padding:10px;
  background:white;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-right:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
}
</style>
</head>

<body>

<!-- 🔒 شاشة الباسورد -->
<div id="loginBox">
  <div>
    <h3>🔒 كلمة السر</h3>
    <input type="password" id="passInput" placeholder="ادخل الباسورد">
    <br><br>
    <button onclick="checkPassword()">دخول</button>
  </div>
</div>

<div id="messages"></div>

<div id="inputBox">
  <input id="msgInput" placeholder="اكتب رسالة...">
  <button onclick="sendMessage()">إرسال</button>
</div>

<script type="module">
// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXGS8i2-fHN8H9FE2jylKlOF9j3sgYxDA",
  authDomain: "star-8444d.firebaseapp.com",
  projectId: "star-8444d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔒 الباسورد
function checkPassword(){
  const pass = document.getElementById("passInput").value;

  if(pass === "7/11/2024"){ // ✨ غير الباسورد هنا
    document.getElementById("loginBox").style.display="none";
  }else{
    alert("❌ غلط");
  }
}
window.checkPassword = checkPassword;

// 👤 اسم المستخدم (يتحفظ)
let username = localStorage.getItem("username");

if(!username){
  username = prompt("اكتب اسمك:");
  localStorage.setItem("username", username);
}

// 📩 إرسال
async function sendMessage(){
  const input = document.getElementById("msgInput");
  if(input.value.trim()==="") return;

  await addDoc(collection(db,"messages"),{
    text: input.value,
    username: username,
    time: new Date()
  });

  input.value="";
}
window.sendMessage = sendMessage;

// 🕒 وقت
function formatTime(date){
  const d = date.toDate();
  return d.getHours()+":"+d.getMinutes();
}

// ❌ حذف
async function deleteMessage(id){
  if(confirm("تمسح؟")){
    await deleteDoc(doc(db,"messages",id));
  }
}
window.deleteMessage = deleteMessage;

// 📡 عرض
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q,(snapshot)=>{
  const messages = document.getElementById("messages");
  messages.innerHTML="";

  snapshot.forEach(docu=>{
    const msg = docu.data();
    const isMe = msg.username === username;

    const div = document.createElement("div");
    div.className = "msg " + (isMe ? "me" : "other");

    div.innerHTML = `
      <button class="delete" onclick="deleteMessage('${docu.id}')">❌</button>
      <b>${msg.username}</b><br>
      ${msg.text}
      <div class="time">${formatTime(msg.time)}</div>
    `;

    messages.appendChild(div);
  });

  messages.scrollTop = messages.scrollHeight;
});

// Enter للإرسال
document.getElementById("msgInput").addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    sendMessage();
  }
});
</script>

</body>
</html>
