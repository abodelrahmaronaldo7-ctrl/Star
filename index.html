<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title> 🌸 غرفه الدردشه  </title>
<style>
body{
  font-family:Arial;
  background: linear-gradient(135deg,#f6d365,#fda085);
  margin:0;
  direction:rtl;
}

#loginBox{
  margin:50px auto;
  background:#ffd1e8;
  width:320px;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

#chatBox{
  display:none;
  width:95%;
  max-width:600px;
  margin:20px auto;
}

#messages{
  height:400px;
  overflow-y:auto;
  background:#ffe0f7;
  padding:15px;
  border-radius:15px;
  display:flex;
  flex-direction: column;
}

.message{
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  max-width:75%;
  word-wrap: break-word;
}

.left{
  align-self:flex-start;
  color:white;
}

.right{
  align-self:flex-end;
  color:white;
}

.time{
  display:block;
  font-size:11px;
  margin-top:5px;
}

#replyPreview{
  display:none;
  background:#ffd1e8;
  padding:8px;
  border-right:4px solid #ff4d6d;
  margin:8px 0;
  border-radius:8px;
  font-size:13px;
}

input{
  width:70%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  background:#ff4d6d;
  color:white;
  border-radius:10px;
}
</style>
</head>
<body>

<div id="loginBox">
  <h3>🔐 دخول الغرفة</h3>
  <input type="text" id="username" placeholder="اسمك">
  <input type="password" id="password" placeholder="كلمة السر">
  <button onclick="checkPassword()">دخول</button>
</div>

<div id="chatBox">
  <div id="messages"></div>
  <div id="replyPreview"></div>
  <input type="text" id="msgInput" placeholder="اكتب رسالة">
  <button onclick="sendMessage()">إرسال</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// ضع هنا بيانات Firebase الخاصة بيك
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myUsername="";
let replyTo=null;

// حفظ الاسم تلقائياً
window.onload=function(){
  const saved=localStorage.getItem("myUsername");
  if(saved) document.getElementById("username").value=saved;
}

// التحقق من كلمة السر
window.checkPassword=function(){
  const user=document.getElementById("username").value.trim();
  const pass=document.getElementById("password").value;
  if(!user){alert("اكتب اسمك");return;}
  if(pass==="7/11/2024"){  // كلمة السر المطلوبة
    myUsername=user;
    localStorage.setItem("myUsername",user);
    document.getElementById("loginBox").style.display="none";
    document.getElementById("chatBox").style.display="block";
  }else{
    alert("كلمة السر غلط");
  }
}

// ألوان ثابتة لكل مستخدم
const colors={};
function getColor(name){
  if(!colors[name]){
    const palette=['#ff4d6d','#6a5acd','#ff8c00','#32cd32','#20b2aa','#ff1493','#00ced1','#ff7f50'];
    colors[name]=palette[Object.keys(colors).length % palette.length];
  }
  return colors[name];
}

// إرسال رسالة
window.sendMessage=async function(){
  const text=document.getElementById("msgInput").value;
  if(!text.trim()) return;

  await addDoc(collection(db,"messages"),{
    text,
    username:myUsername,
    time:Date.now(),
    reply:replyTo
  });

  document.getElementById("msgInput").value="";
  replyTo=null;
  document.getElementById("replyPreview").style.display="none";
}

// عرض الرسائل تحت بعض
const q=query(collection(db,"messages"),orderBy("time"));
onSnapshot(q,(snapshot)=>{
  const box=document.getElementById("messages");
  box.innerHTML="";
  snapshot.forEach(doc=>{
    const data=doc.data();
    const div=document.createElement("div");
    div.className="message "+(data.username===myUsername?"right":"left");
    div.style.background=getColor(data.username);

    if(data.reply){
      div.innerHTML+=`
      <div style="
        background:#ffd1e8;
        padding:5px;
        border-right:3px solid #ff4d6d;
        margin-bottom:5px;
        font-size:12px;
        border-radius:6px;">
        <b>${data.reply.username}</b><br>
        ${data.reply.text}
      </div>`;
    }

    div.innerHTML+=`
      <b>${data.username}</b><br>
      ${data.text}
      <span class="time">
      ${new Date(data.time).toLocaleDateString("ar-EG")}
      ${new Date(data.time).toLocaleTimeString("ar-EG")}
      </span>`;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
});

// تحديد رد
function setReply(data){
  replyTo={text:data.text, username:data.username};
  const preview=document.getElementById("replyPreview");
  preview.innerHTML=`
    <b>رد على ${data.username}</b><br>
    ${data.text}
    <br><button onclick="cancelReply()">إلغاء</button>`;
  preview.style.display="block";
}

window.cancelReply=function(){
  replyTo=null;
  document.getElementById("replyPreview").style.display="none";
}

// إرسال بالضغط على Enter
document.getElementById("msgInput").addEventListener("keypress",function(e){
  if(e.key==="Enter"){sendMessage();}
});
</script>

</body>
</html>
